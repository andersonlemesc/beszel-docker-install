services:
  beszel:
    image: henrygd/beszel:latest
    container_name: beszel
    restart: unless-stopped
    ports:
      - 8090:8090
    environment:
      APP_URL: "https://${DOMINIO}"
    volumes:
      - beszel_data:/beszel_data
      - beszel_socket:/beszel_socket
    networks:
      - app_network
    labels:
      com.centurylinklabs.watchtower.enable: "true"
      # ── Traefik v3 (comentado — usando Nginx) ─────────────
      # traefik.enable: "true"
      # traefik.http.routers.beszel.rule: "Host(`beszel.seudominio.com`)"
      # traefik.http.routers.beszel.entrypoints: "websecure"
      # traefik.http.routers.beszel.tls.certresolver: "letsencrypt"
      # traefik.http.services.beszel.loadbalancer.server.port: "8090"
      # traefik.http.middlewares.beszel-sse.compress: "false"
      # traefik.http.routers.beszel.middlewares: "beszel-sse"

  beszel-agent:
    image: henrygd/beszel-agent:latest
    container_name: beszel-agent
    restart: unless-stopped
    volumes:
      - beszel_agent_data:/var/lib/beszel-agent
      - beszel_socket:/beszel_socket
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/run/dbus/system_bus_socket:/var/run/dbus/system_bus_socket:ro
    environment:
      LISTEN: "/beszel_socket/beszel.sock"
      HUB_URL: "http://beszel:8090"
      TOKEN: "${BESZEL_TOKEN}"
      KEY: "${BESZEL_KEY}"
      FILESYSTEM: "sda1"
      SERVICE_PATTERNS: "*"
    networks:
      - app_network
    depends_on:
      - beszel

volumes:
  beszel_data:
  beszel_agent_data:
  beszel_socket:

networks:
  app_network:
    external: true
    name: app_network
