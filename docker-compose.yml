services:

  # ------------------------------------------------------------
  # HUB — Interface web + armazenamento de dados históricos
  # ------------------------------------------------------------
  beszel:
    image: henrygd/beszel:latest
    container_name: beszel
    restart: unless-stopped
    environment:
      APP_URL: "https://${DOMINIO}"
      # ── OAuth2 / SSO (descomente para ativar) ──────────────
      # USER_CREATION: "true"
      # DISABLE_PASSWORD_AUTH: "true"
    volumes:
      - beszel_data:/beszel_data
      - beszel_socket:/beszel_socket
    networks:
      - traefik_public
    deploy:
      replicas: 1
      labels:
        traefik.enable: "true"
        traefik.http.routers.beszel.rule: "Host(`${DOMINIO}`)"
        traefik.http.routers.beszel.entrypoints: "websecure"
        traefik.http.routers.beszel.tls.certresolver: "letsencrypt"
        traefik.http.services.beszel.loadbalancer.server.port: "8090"
        # ⚠️ Obrigatório para SSE funcionar — desativa compressão no stream
        traefik.http.middlewares.beszel-sse.compress.excludedContentTypes: "text/event-stream"
        traefik.http.routers.beszel.middlewares: "beszel-sse"

  # ------------------------------------------------------------
  # AGENT LOCAL — Coleta métricas desta máquina via Unix Socket
  # ------------------------------------------------------------
  beszel-agent:
    image: henrygd/beszel-agent:latest
    container_name: beszel-agent
    restart: unless-stopped
    volumes:
      - beszel_agent_data:/var/lib/beszel-agent
      - beszel_socket:/beszel_socket
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # Descomente para monitorar serviços systemd
      # - /var/run/dbus/system_bus_socket:/var/run/dbus/system_bus_socket:ro
    environment:
      LISTEN: "/beszel_socket/beszel.sock"
      HUB_URL: "http://beszel:8090"
      TOKEN: "${BESZEL_TOKEN}"
      KEY: "${BESZEL_KEY}"
      FILESYSTEM: "sda1"
      # Descomente para monitorar serviços systemd (requer volume acima)
      # SERVICE_PATTERNS: "*"
    networks:
      - traefik_public
    depends_on:
      - beszel
    deploy:
      replicas: 1

volumes:
  beszel_data:
  beszel_agent_data:
  beszel_socket:

networks:
  traefik_public:
    external: true
    name: traefik_public
